name: Weekly AI Model Retraining

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

jobs:
  retrain:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn joblib

      - name: Clear pycache
        run: find . -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true

      - name: Generate synthetic dataset
        run: cd backend && python ai/dataset_generator.py

      - name: Merge real data if available
        run: |
          python - <<'EOF'
          import os
          import sys
          import sqlite3
          import pandas as pd

          os.chdir("backend")
          sys.path.insert(0, ".")

          DB_PATH = "passport_db.sqlite"
          SYNTHETIC_PATH = "ai/synthetic_drivers.csv"

          synthetic_df = pd.read_csv(SYNTHETIC_PATH)
          print(f"✅ Synthetic data: {len(synthetic_df)} records.")

          real_df = None

          if os.path.exists(DB_PATH):
              try:
                  conn = sqlite3.connect(DB_PATH)
                  cursor = conn.cursor()
                  cursor.execute("""
                      SELECT name FROM sqlite_master
                      WHERE type='table' AND name='driver_behaviour'
                  """)
                  table_exists = cursor.fetchone()

                  if table_exists:
                      real_df = pd.read_sql("""
                          SELECT
                              current_points,
                              offences_last_12m,
                              minor_offences,
                              moderate_offences,
                              severe_offences,
                              days_since_last_offence,
                              avg_days_between_offences,
                              years_since_licence_issue,
                              suspension_proximity,
                              stability_index,
                              trend_encoded,
                              label
                          FROM driver_behaviour
                          WHERE label IS NOT NULL
                      """, conn)
                      conn.close()
                      print(f"✅ Real data loaded: {len(real_df)} records.")
                  else:
                      conn.close()
                      print("⚠️  driver_behaviour table not found. Skipping.")
              except Exception as e:
                  print(f"⚠️  SQLite error: {e}. Skipping real data.")
          else:
              print("⚠️  No database found. Using synthetic only.")

          if real_df is not None and len(real_df) > 0:
              combined_df = pd.concat([real_df, synthetic_df], ignore_index=True)
              combined_df = combined_df.sample(frac=1, random_state=42).reset_index(drop=True)
              combined_df.to_csv(SYNTHETIC_PATH, index=False)
              print(f"✅ Combined: {len(combined_df)} total records")
              print(f"   ├── Real:      {len(real_df)}")
              print(f"   └── Synthetic: {len(synthetic_df)}")
          else:
              print("✅ Using synthetic data only.")
          EOF

      - name: Train model
        run: cd backend && python ai/train_model.py

      - name: Commit updated model
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/ai/best_model.pkl backend/ai/feature_importance.csv backend/ai/synthetic_drivers.csv
          git diff --cached --quiet || git commit -m "chore: retrain AI model [$(date +'%Y-%m-%d')]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}